<!-- Wrap your main questionnaire content in this form tag -->
<form action="/submit-data" method="POST">
    
    <!-- ... (All your existing UI code stays inside here) ... -->

    <!-- Example of how I updated your inputs (Apply 'name' to all sliders/inputs) -->
    <div class="space-y-4">
        <label class="block text-sm font-bold text-on-surface">Sleep Schedule Sensitivity</label>
        <input name="sleep_sensitivity" type="range" class="w-full h-2 bg-secondary-container rounded-lg appearance-none cursor-pointer accent-primary" />
        <div class="flex justify-between text-[10px] font-bold text-on-surface-variant uppercase tracking-tighter">
            <span>Heavy Sleeper</span>
            <span>Light Sleeper</span>
        </div>
    </div>

    <!-- Repeat the 'name' attribute for your other sections: -->
    <!-- <input name="social_energy" type="range" ... /> -->
    <!-- <input name="cleanliness" type="range" ... /> -->

    <!-- Update the button at the bottom of your file to this: -->
    <div class="mt-12 flex items-center justify-between border-t border-outline-variant/15 pt-8">
        <div class="flex items-center gap-4">
            <div class="h-2 w-48 bg-surface-container rounded-full overflow-hidden">
                <div class="h-full w-2/3 bg-primary rounded-full"></div>
            </div>
            <span class="text-xs font-bold text-on-surface-variant">Step 2 of 3</span>
        </div>
        <div class="flex gap-4">
            <button type="button" class="px-8 py-3 rounded-xl font-bold text-sm text-on-surface-variant hover:bg-surface-container-high transition-colors">
                Save Draft
            </button>
            <!-- CRITICAL: Ensure this is type="submit" -->
            <button type="submit" class="bg-primary text-on-primary px-10 py-3 rounded-xl font-bold text-sm shadow-lg shadow-emerald-900/10 hover:opacity-90 hover:scale-[1.02] active:scale-[0.98] transition-all">
                Save & Continue
            </button>
        </div>
    </div>

</form>
